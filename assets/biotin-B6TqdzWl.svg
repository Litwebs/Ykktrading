<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#edf7f0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#dff0e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f7ee;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bottleBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2e8b52;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#309155;stop-opacity:1" />
      <stop offset="65%" style="stop-color:#3aaa68;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#28794a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d5e38;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#143f27;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="labelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f4fdf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="pillGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd966;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5a623;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-10%" width="140%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#1a5c35" flood-opacity="0.3"/>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <clipPath id="bottleClip">
      <path d="M188,182 Q182,190 180,210 L172,400 Q170,430 196,444 L316,444 Q342,430 340,400 L332,210 Q330,190 324,182 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGrad)" />

  <!-- Subtle dot pattern -->
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="1.2" fill="#309155" fill-opacity="0.08"/>
  </pattern>
  <rect width="512" height="512" fill="url(#dots)"/>

  <!-- Decorative circles -->
  <circle cx="80" cy="80" r="90" fill="#309155" fill-opacity="0.04"/>
  <circle cx="432" cy="432" r="110" fill="#309155" fill-opacity="0.05"/>
  <circle cx="430" cy="80" r="60" fill="#f5a623" fill-opacity="0.06"/>

  <!-- Floating pills (decorative) -->
  <!-- Pill 1 -->
  <g transform="translate(95,160) rotate(-25)" filter="url(#softShadow)">
    <rect x="-22" y="-8" width="44" height="16" rx="8" fill="url(#pillGrad)" opacity="0.85"/>
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#e8961f" stroke-width="1" opacity="0.5"/>
  </g>
  <!-- Pill 2 -->
  <g transform="translate(420,170) rotate(15)" filter="url(#softShadow)">
    <rect x="-18" y="-7" width="36" height="14" rx="7" fill="url(#pillGrad)" opacity="0.7"/>
    <line x1="0" y1="-7" x2="0" y2="7" stroke="#e8961f" stroke-width="1" opacity="0.5"/>
  </g>
  <!-- Pill 3 -->
  <g transform="translate(110,360) rotate(10)" filter="url(#softShadow)">
    <rect x="-15" y="-6" width="30" height="12" rx="6" fill="url(#pillGrad)" opacity="0.6"/>
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#e8961f" stroke-width="1" opacity="0.5"/>
  </g>
  <!-- Pill 4 -->
  <g transform="translate(400,360) rotate(-18)" filter="url(#softShadow)">
    <rect x="-20" y="-7" width="40" height="14" rx="7" fill="url(#pillGrad)" opacity="0.75"/>
    <line x1="0" y1="-7" x2="0" y2="7" stroke="#e8961f" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- ===== BOTTLE ===== -->
  <g filter="url(#shadow)">
    <!-- Bottle shoulder / neck -->
    <path d="M214,130 L214,150 Q210,158 206,170 L188,182 L324,182 L306,170 Q302,158 298,150 L298,130 Z" fill="url(#capGrad)"/>

    <!-- Neck ring detail -->
    <rect x="207" y="145" width="98" height="6" rx="3" fill="#1a4a2c"/>

    <!-- Cap -->
    <rect x="204" y="96" width="104" height="40" rx="10" fill="url(#capGrad)"/>
    <rect x="208" y="100" width="96" height="32" rx="8" fill="#21683e"/>
    <!-- Cap ridges -->
    <line x1="216" y1="100" x2="216" y2="132" stroke="#1a5230" stroke-width="2" opacity="0.5"/>
    <line x1="228" y1="100" x2="228" y2="132" stroke="#1a5230" stroke-width="2" opacity="0.5"/>
    <line x1="240" y1="100" x2="240" y2="132" stroke="#1a5230" stroke-width="2" opacity="0.5"/>
    <line x1="252" y1="100" x2="252" y2="132" stroke="#1a5230" stroke-width="2" opacity="0.5"/>
    <line x1="264" y1="100" x2="264" y2="132" stroke="#1a5230" stroke-width="2" opacity="0.5"/>
    <line x1="276" y1="100" x2="276" y2="132" stroke="#1a5230" stroke-width="2" opacity="0.5"/>
    <line x1="288" y1="100" x2="288" y2="132" stroke="#1a5230" stroke-width="2" opacity="0.5"/>

    <!-- Bottle body -->
    <path d="M188,182 Q182,190 180,210 L172,400 Q170,430 196,444 L316,444 Q342,430 340,400 L332,210 Q330,190 324,182 Z" fill="url(#bottleBody)"/>

    <!-- Label background -->
    <rect x="182" y="220" width="148" height="190" rx="6" fill="url(#labelGrad)" clip-path="url(#bottleClip)"/>

    <!-- Label top accent stripe -->
    <rect x="182" y="220" width="148" height="8" fill="#309155" clip-path="url(#bottleClip)" opacity="0.9"/>

    <!-- Label bottom accent stripe -->
    <rect x="182" y="402" width="148" height="8" fill="#309155" clip-path="url(#bottleClip)" opacity="0.9"/>

    <!-- Brand name on label -->
    <text x="256" y="252" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-size="11" font-weight="900" fill="#309155" letter-spacing="3" clip-path="url(#bottleClip)">YKK TRADING</text>

    <!-- Divider line -->
    <line x1="196" y1="260" x2="316" y2="260" stroke="#309155" stroke-width="0.8" stroke-opacity="0.3" clip-path="url(#bottleClip)"/>

    <!-- BIOTIN main text -->
    <text x="256" y="302" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-size="34" font-weight="900" fill="#1d3f2a" letter-spacing="1" clip-path="url(#bottleClip)">BIOTIN</text>

    <!-- Vitamin B7 sub text -->
    <text x="256" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#309155" letter-spacing="2" clip-path="url(#bottleClip)">VITAMIN B7</text>

    <!-- Divider line 2 -->
    <line x1="196" y1="334" x2="316" y2="334" stroke="#309155" stroke-width="0.8" stroke-opacity="0.3" clip-path="url(#bottleClip)"/>

    <!-- High Strength badge -->
    <rect x="218" y="342" width="76" height="18" rx="9" fill="#309155" clip-path="url(#bottleClip)"/>
    <text x="256" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#ffffff" letter-spacing="1.5" clip-path="url(#bottleClip)">HIGH STRENGTH</text>

    <!-- Count text -->
    <text x="256" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555" letter-spacing="0.5" clip-path="url(#bottleClip)">60 Tablets · 10,000 mcg</text>

    <!-- Bottle shine -->
    <path d="M188,182 Q182,190 180,210 L172,400 Q170,430 196,444 L216,444 L206,210 Q204,190 210,182 Z" fill="url(#shineGrad)"/>
  </g>

  <!-- Leaf accent (bottom right, decorative) -->
  <g transform="translate(390,430) rotate(-30)" opacity="0.18">
    <ellipse cx="0" cy="0" rx="28" ry="12" fill="#309155"/>
    <line x1="-28" y1="0" x2="28" y2="0" stroke="#309155" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="20" y2="-8" stroke="#309155" stroke-width="1"/>
    <line x1="0" y1="0" x2="-16" y2="-6" stroke="#309155" stroke-width="1"/>
  </g>
  <g transform="translate(118,435) rotate(20)" opacity="0.14">
    <ellipse cx="0" cy="0" rx="22" ry="10" fill="#309155"/>
    <line x1="-22" y1="0" x2="22" y2="0" stroke="#309155" stroke-width="1.2"/>
  </g>
</svg>
